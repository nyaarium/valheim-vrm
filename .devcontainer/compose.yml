services:
  dev:
    tty: true
    hostname: devcontainer
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.devcontainer
      args:
        PROJECT_NAME: valheim-vrm
    volumes:
      # Workspace
      - ..:/workspace/valheim-vrm:cached
      - /mnt/s/Steam/steamapps/common/Valheim:/mnt/valheim:cached
      # Home
      - ../volumes/home:/home/vscode:cached
      # Additional scripts
      - ~/scripts:/home/vscode/scripts:ro
    networks:
      - agent-team-bridge-network
networks:
  agent-team-bridge-network:
    name: agent-team-bridge
